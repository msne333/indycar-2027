<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027 IndyCar Lineup Predictor</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0D;--surface:#1A1A1A;--surface2:#242424;--border:#2E2E2E;
  --red:#C8102E;--yellow:#F5C518;--white:#F0EDE8;--grey:#888;--grey-dim:#555;
  --green:#2ECC71;--mfr-gold:#D4A017;--mfr-gold-dim:#7A5C0A;
  --font-d:'Bebas Neue',sans-serif;--font-b:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--white);font-family:var(--font-b);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--white);font-family:var(--font-b);font-size:13px;outline:none;transition:border-color 0.2s}
input:focus{border-color:var(--red)}input::placeholder{color:var(--grey)}
button{cursor:pointer;font-family:var(--font-b)}
@keyframes pulse{0%,100%{border-color:var(--grey-dim)}50%{border-color:var(--grey)}}
@keyframes spin{to{transform:rotate(360deg)}}
.rm{opacity:0;transition:opacity 0.15s}.sw:hover .rm{opacity:1}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const BIN_ID   = '6a3bfa0bda38895dfef8188c';
const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
// JSONBin public bin — no API key needed for read/write on a public bin
// We version-lock writes with the ETag to avoid clobbering concurrent saves

const TEAMS = [
  { id:'CGR', name:'Chip Ganassi Racing',      type:'full', slots:4 },
  { id:'PRI', name:'Penske Racing',             type:'full', slots:4 },
  { id:'AND', name:'Andretti Global',           type:'full', slots:5 },
  { id:'RLL', name:'Rahal Letterman Lanigan',   type:'full', slots:3 },
  { id:'ECR', name:'Ed Carpenter Racing',       type:'full', slots:2 },
  { id:'MSR', name:'Meyer Shank Racing',        type:'full', slots:2 },
  { id:'AJF', name:'AJ Foyt Enterprises',       type:'full', slots:2 },
  { id:'AMR', name:'Arrow McLaren',             type:'full', slots:3 },
  { id:'DCR', name:'Dale Coyne Racing',         type:'full', slots:2 },
  { id:'JHR', name:'Juncos Hollinger Racing',   type:'full', slots:2 },
  { id:'CHT', name:'Charter / Part-Time',       type:'part', slots:3 },
];

const DRIVERS = [
  'Armstrong','Aron','Browning','Collet','Daly','De Tullio','de Vries','Delatraz',
  'Dixon','Erricson','Ferrucci','Fornaroli','Foster','Grosjean','Hauger','Herta',
  'Hughes','Ilott','Johnson','Kanaan','Kirkwood','Kucharczyk','Lawson','Lundgaard',
  'Lundqvist','Malukas','Mcelrea','Mclaughlin','Nasr','Newgarden','Oward','Palou',
  'Pourchaire','Power','Rahal','Rassmussen','Robb','Rosenqvist','Rossi','Rowe',
  'Schumacher','Simpson','Sowery','Taylor','Tsunoda','Veekay','Vips'
];

// ── JSONBin API ───────────────────────────────────────────────────────────────
async function fetchSubmissions() {
  const r = await fetch(BASE_URL + '/latest', {
    headers:{'X-JSON-Confidentiality':'false'}
  });
  if (!r.ok) throw new Error('fetch failed');
  const j = await r.json();
  const etag = r.headers.get('ETag') || '';
  return { data: Array.isArray(j.record) ? j.record : [], etag };
}

async function pushSubmissions(newEntry) {
  // Read → append → write (simple, fine for low-concurrency use)
  const { data } = await fetchSubmissions();
  data.push(newEntry);
  const r = await fetch(BASE_URL, {
    method:'PUT',
    headers:{'Content-Type':'application/json','X-JSON-Confidentiality':'false'},
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('write failed');
  return data;
}

// ── helpers ───────────────────────────────────────────────────────────────────
function usedSet(asgn, mfrAsgn, mfrActive) {
  const s = new Set(Object.values(asgn).filter(Boolean));
  if (mfrActive) mfrAsgn.forEach(d => d && s.add(d));
  return s;
}
function totalSlots(mfrActive){ return TEAMS.reduce((s,t)=>s+t.slots,0)+(mfrActive?2:0); }
function filledCount(asgn, mfrAsgn, mfrActive){
  return Object.values(asgn).filter(Boolean).length + (mfrActive?mfrAsgn.filter(Boolean).length:0);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({msg}){
  return msg ? <div style={{
    position:'fixed',bottom:88,left:'50%',transform:'translateX(-50%)',
    background:'#333',border:'1px solid var(--border)',color:'var(--white)',
    padding:'8px 18px',borderRadius:20,fontSize:13,fontWeight:500,
    zIndex:9999,pointerEvents:'none',whiteSpace:'nowrap'
  }}>{msg}</div> : null;
}

// ── Spinner ───────────────────────────────────────────────────────────────────
function Spinner(){
  return <div style={{width:18,height:18,border:'2px solid var(--border)',
    borderTopColor:'var(--white)',borderRadius:'50%',
    animation:'spin 0.7s linear infinite',display:'inline-block'}}/>
}

// ── Driver modal ──────────────────────────────────────────────────────────────
function DriverModal({open,title,used,onSelect,onClose}){
  const [q,setQ]=useState('');
  const ref=useRef();
  useEffect(()=>{if(open){setQ('');setTimeout(()=>ref.current?.focus(),80);}}, [open]);
  if(!open)return null;
  const filtered=DRIVERS.filter(d=>!q||d.toLowerCase().includes(q.toLowerCase()));
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{
      position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',
      display:'flex',alignItems:'center',justifyContent:'center',
      backdropFilter:'blur(4px)',zIndex:500
    }}>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,
        width:340,maxHeight:'75vh',display:'flex',flexDirection:'column',
        boxShadow:'0 24px 64px rgba(0,0,0,0.6)',overflow:'hidden'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',
          display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontFamily:'var(--font-d)',fontSize:20,letterSpacing:1}}>{title}</div>
            <div style={{fontSize:11,color:'var(--grey)',marginTop:2}}>Select a driver</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--grey)',fontSize:20,lineHeight:1,padding:4}}>✕</button>
        </div>
        <div style={{padding:'10px 14px 0'}}>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…" style={{width:'100%'}}
            onKeyDown={e=>{
              if(e.key==='Enter'){const f=filtered.find(d=>!used.has(d));if(f)onSelect(f);}
              if(e.key==='Escape')onClose();
            }}/>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'10px'}}>
          {filtered.map(d=>(
            <div key={d} onClick={()=>!used.has(d)&&onSelect(d)} style={{
              padding:'9px 12px',borderRadius:6,cursor:used.has(d)?'not-allowed':'pointer',
              fontSize:14,fontWeight:500,display:'flex',alignItems:'center',justifyContent:'space-between',
              opacity:used.has(d)?0.28:1,textDecoration:used.has(d)?'line-through':'none',
              transition:'background 0.1s'
            }}
            onMouseEnter={e=>!used.has(d)&&(e.currentTarget.style.background='var(--surface2)')}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span>{d}</span>
              {used.has(d)&&<span style={{fontSize:11,color:'var(--grey)'}}>assigned</span>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Compare view ──────────────────────────────────────────────────────────────
function CompareView({onClose}){
  const [subs,setSubs]=useState(null);
  const [err,setErr]=useState('');
  const [tab,setTab]=useState('team');

  useEffect(()=>{
    fetchSubmissions()
      .then(({data})=>setSubs(data))
      .catch(()=>setErr('Could not load submissions. Check your connection.'));
  },[]);

  if(err) return (
    <Overlay onClose={onClose}>
      <div style={{textAlign:'center',padding:'40px 24px'}}>
        <div style={{fontFamily:'var(--font-d)',fontSize:22,letterSpacing:2,marginBottom:8,color:'var(--red)'}}>LOAD ERROR</div>
        <div style={{fontSize:13,color:'var(--grey)',marginBottom:24}}>{err}</div>
        <Btn onClick={onClose}>CLOSE</Btn>
      </div>
    </Overlay>
  );

  if(!subs) return (
    <Overlay onClose={onClose}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,padding:'48px 24px'}}>
        <Spinner/>
        <div style={{fontSize:13,color:'var(--grey)'}}>Loading predictions…</div>
      </div>
    </Overlay>
  );

  if(subs.length===0) return (
    <Overlay onClose={onClose}>
      <div style={{textAlign:'center',padding:'40px 24px'}}>
        <div style={{fontFamily:'var(--font-d)',fontSize:28,letterSpacing:2,marginBottom:8}}>NO SUBMISSIONS YET</div>
        <div style={{fontSize:13,color:'var(--grey)',marginBottom:24}}>Be the first to lock in a lineup.</div>
        <Btn onClick={onClose}>BACK</Btn>
      </div>
    </Overlay>
  );

  // Build slot key list
  const slotKeys=[];
  TEAMS.forEach(t=>{
    for(let i=0;i<t.slots;i++)
      slotKeys.push({key:`${t.id}-${i}`,label:`Car ${i+1}`,teamId:t.id,teamName:t.name,type:t.type});
  });
  const anyMfr=subs.some(s=>s.mfrActive);
  if(anyMfr){
    slotKeys.push({key:'mfr-0',label:'MFR Car 1',teamId:'MFR',teamName:'Manufacturer Charter',type:'mfr'});
    slotKeys.push({key:'mfr-1',label:'MFR Car 2',teamId:'MFR',teamName:'Manufacturer Charter',type:'mfr'});
  }

  function pickFor(s,key){
    if(key.startsWith('mfr-')) return s.mfrActive ? s.mfrAssignments[parseInt(key.split('-')[1])] : null;
    return s.assignments[key]||null;
  }

  function slotStats(key){
    const picks=subs.map(s=>pickFor(s,key)).filter(Boolean);
    if(!picks.length)return{top:null,pct:0,freq:{}};
    const freq={};
    picks.forEach(p=>freq[p]=(freq[p]||0)+1);
    const [top,n]=Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
    return{top,pct:Math.round(n/subs.length*100),freq};
  }

  const tabBtn=(label,val)=>(
    <button onClick={()=>setTab(val)} style={{
      background:'none',border:'none',padding:'8px 18px',fontSize:13,fontWeight:500,
      letterSpacing:0.5,cursor:'pointer',
      color:tab===val?'var(--white)':'var(--grey)',
      borderBottom:tab===val?'2px solid var(--red)':'2px solid transparent',
    }}>{label}</button>
  );

  // Group slotKeys by team for byTeam view
  const teamGroups={};
  slotKeys.forEach(sk=>{
    if(!teamGroups[sk.teamId]) teamGroups[sk.teamId]={teamName:sk.teamName,slots:[]};
    teamGroups[sk.teamId].slots.push(sk);
  });

  return (
    <Overlay onClose={onClose} wide>
      {/* header */}
      <div style={{padding:'18px 24px',borderBottom:'1px solid var(--border)',
        display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div>
          <div style={{fontFamily:'var(--font-d)',fontSize:26,letterSpacing:2}}>COMPARE LINEUPS</div>
          <div style={{fontSize:12,color:'var(--grey)',marginTop:3}}>
            {subs.length} prediction{subs.length!==1?'s':''} submitted
          </div>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',color:'var(--grey)',fontSize:22,padding:4}}>✕</button>
      </div>
      {/* tabs */}
      <div style={{borderBottom:'1px solid var(--border)',padding:'0 16px',display:'flex',gap:4,flexShrink:0}}>
        {tabBtn('BY TEAM','team')}
        {tabBtn('BY PERSON','person')}
      </div>
      {/* content */}
      <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>

        {tab==='team' && Object.entries(teamGroups).map(([tid,{teamName,slots}])=>(
          <div key={tid} style={{marginBottom:28}}>
            <div style={{fontFamily:'var(--font-d)',fontSize:16,letterSpacing:1.5,
              color:'var(--grey)',marginBottom:12,paddingBottom:6,
              borderBottom:'1px solid var(--border)'}}>
              {teamName}
            </div>
            {slots.map(sk=>{
              const {top,pct,freq}=slotStats(sk.key);
              const isMfr=sk.type==='mfr';
              const barColor=pct===100?'var(--green)':pct>=60?'var(--yellow)':'var(--red)';
              const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
              const picks=subs.map(s=>({name:s.submittedBy,driver:pickFor(s,sk.key)||'—'}));
              return (
                <div key={sk.key} style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:500,letterSpacing:1,textTransform:'uppercase',
                    color:'var(--grey-dim)',marginBottom:6}}>{sk.label}</div>
                  {top && <>
                    {sorted.map(([d,n],ri)=>(
                      <div key={d} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                        <span style={{fontSize:ri===0?13:12,fontWeight:ri===0?600:400,
                          color:ri===0?(isMfr?'var(--mfr-gold)':'var(--white)'):'var(--grey)',
                          minWidth:110}}>{d}</span>
                        <div style={{flex:1,height:ri===0?6:4,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                          <div style={{width:`${Math.round(n/subs.length*100)}%`,height:'100%',
                            background:ri===0?barColor:'var(--grey-dim)',borderRadius:3,transition:'width 0.5s'}}/>
                        </div>
                        <span style={{fontSize:11,color:ri===0?'var(--grey)':'var(--grey-dim)',
                          minWidth:36,textAlign:'right'}}>{Math.round(n/subs.length*100)}%</span>
                        <span style={{fontSize:11,color:'var(--grey-dim)',minWidth:20,textAlign:'right'}}>
                          {n}/{subs.length}
                        </span>
                      </div>
                    ))}
                    <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:6}}>
                      {picks.map((p,i)=>(
                        <div key={i} style={{
                          background:'var(--surface2)',border:'1px solid var(--border)',
                          borderRadius:4,padding:'3px 9px',fontSize:12,
                          display:'flex',alignItems:'center',gap:5
                        }}>
                          <span style={{color:'var(--grey)',fontSize:11}}>{p.name}</span>
                          <span style={{color: isMfr?'var(--mfr-gold)':'var(--white)',fontWeight:600}}>{p.driver}</span>
                        </div>
                      ))}
                    </div>
                  </>}
                  {!top && <div style={{fontSize:12,color:'var(--grey-dim)',fontStyle:'italic'}}>No picks for this slot</div>}
                </div>
              );
            })}
          </div>
        ))}

        {tab==='person' && subs.map((s,si)=>(
          <div key={si} style={{marginBottom:28,paddingBottom:20,
            borderBottom:si<subs.length-1?'1px solid var(--border)':'none'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:'var(--red)',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontFamily:'var(--font-d)',fontSize:18,letterSpacing:1,flexShrink:0}}>
                {s.submittedBy.charAt(0).toUpperCase()}
              </div>
              <div>
                <div style={{fontWeight:600,fontSize:15}}>{s.submittedBy}</div>
                <div style={{fontSize:11,color:'var(--grey)'}}>
                  {new Date(s.submittedAt).toLocaleString()}
                  {s.mfrActive?' · MFR charter included':''}
                </div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:5}}>
              {TEAMS.map(t=>Array.from({length:t.slots},(_,i)=>{
                const d=s.assignments[`${t.id}-${i}`];
                return d?(
                  <div key={`${t.id}-${i}`} style={{display:'flex',gap:7,alignItems:'center',
                    background:'var(--surface2)',border:'1px solid var(--border)',
                    borderRadius:4,padding:'5px 10px',fontSize:12}}>
                    <span style={{color:'var(--grey-dim)',fontSize:10,minWidth:30}}>{t.id}</span>
                    <span style={{fontWeight:600,color:'var(--white)'}}>{d}</span>
                  </div>
                ):null;
              }))}
              {s.mfrActive&&s.mfrAssignments.map((d,i)=>d&&(
                <div key={`mfr-${i}`} style={{display:'flex',gap:7,alignItems:'center',
                  background:'rgba(212,160,23,0.08)',border:'1px solid var(--mfr-gold)',
                  borderRadius:4,padding:'5px 10px',fontSize:12}}>
                  <span style={{color:'var(--mfr-gold)',fontSize:10,minWidth:30}}>MFR</span>
                  <span style={{fontWeight:600,color:'var(--mfr-gold)'}}>{d}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div style={{padding:'14px 24px',borderTop:'1px solid var(--border)',flexShrink:0}}>
        <Btn onClick={onClose}>CLOSE</Btn>
      </div>
    </Overlay>
  );
}

function Overlay({onClose,wide,children}){
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{
      position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',
      display:'flex',alignItems:'flex-start',justifyContent:'center',
      backdropFilter:'blur(6px)',zIndex:600,overflowY:'auto',padding:'40px 16px'
    }}>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,
        width:'100%',maxWidth:wide?780:400,boxShadow:'0 32px 80px rgba(0,0,0,0.7)',
        display:'flex',flexDirection:'column',maxHeight:'85vh'}}>
        {children}
      </div>
    </div>
  );
}

function Btn({onClick,primary=false,disabled=false,children}){
  return (
    <button onClick={onClick} disabled={disabled} style={{
      fontFamily:'var(--font-d)',fontSize:17,letterSpacing:2,
      background:primary?'var(--red)':'none',
      color:primary?'var(--white)':'var(--grey)',
      border:primary?'none':'1px solid var(--border)',
      padding:'10px 26px',borderRadius:6,cursor:disabled?'not-allowed':'pointer',
      clipPath:primary?'polygon(0 0,100% 0,97% 100%,3% 100%)':'none',
      opacity:disabled?0.4:1,transition:'all 0.2s'
    }}>{children}</button>
  );
}

// ── Section heading ───────────────────────────────────────────────────────────
function SH({children}){
  return (
    <div style={{fontFamily:'var(--font-d)',fontSize:15,letterSpacing:2,color:'var(--grey)',
      marginBottom:12,textTransform:'uppercase',display:'flex',alignItems:'center',gap:10}}>
      {children}
      <div style={{flex:1,height:1,background:'var(--border)'}}/>
    </div>
  );
}

// ── Slot ──────────────────────────────────────────────────────────────────────
function Slot({label,driver,isMfr,onClick,onRemove}){
  const filled=!!driver;
  const bc=filled?(isMfr?'var(--mfr-gold)':'var(--green)'):(isMfr?'var(--mfr-gold-dim)':'var(--grey-dim)');
  const bg=filled?(isMfr?'rgba(212,160,23,0.08)':'#192619'):'#1E1E1E';
  return (
    <div className="sw" onClick={filled?undefined:onClick} style={{
      height:44,border:`1.5px ${filled?'solid':'dashed'} ${bc}`,borderRadius:6,
      display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 12px',
      cursor:filled?'default':'pointer',background:bg,transition:'all 0.2s',
      animation:filled?undefined:'pulse 2s ease-in-out infinite',
    }}>
      <span style={{fontSize:11,fontWeight:500,letterSpacing:1,textTransform:'uppercase',color:'var(--grey)'}}>
        {label}
      </span>
      {filled&&<span style={{fontWeight:600,fontSize:14,color:isMfr?'var(--mfr-gold)':'var(--white)'}}>{driver}</span>}
      {filled&&(
        <button className="rm" onClick={e=>{e.stopPropagation();onRemove();}} style={{
          width:22,height:22,borderRadius:'50%',background:'rgba(200,16,46,0.2)',
          border:'none',color:'var(--red)',fontSize:13,display:'flex',
          alignItems:'center',justifyContent:'center',padding:0
        }}>✕</button>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [asgn,setAsgn]=useState({});
  const [mfrAsgn,setMfrAsgn]=useState([null,null]);
  const [mfrActive,setMfrActive]=useState(false);
  const [modal,setModal]=useState(null);
  const [dSearch,setDSearch]=useState('');
  const [toast,setToast]=useState('');
  const [showCompare,setShowCompare]=useState(false);
  const [name,setName]=useState('');
  const [submitting,setSubmitting]=useState(false);
  const [submitted,setSubmitted]=useState(false);
  const toastT=useRef();

  const showToast=useCallback(msg=>{
    setToast(msg);clearTimeout(toastT.current);
    toastT.current=setTimeout(()=>setToast(''),2200);
  },[]);

  const used=usedSet(asgn,mfrAsgn,mfrActive);
  const filled=filledCount(asgn,mfrAsgn,mfrActive);
  const total=totalSlots(mfrActive);
  const complete=filled===total&&total>0;
  const pct=total>0?(filled/total)*100:0;

  function assign(key,driver){
    if(key.startsWith('mfr-')){
      const i=parseInt(key.split('-')[1]);
      setMfrAsgn(p=>{const n=[...p];n[i]=driver;return n;});
    } else {
      setAsgn(p=>({...p,[key]:driver}));
    }
    showToast(`${driver} assigned`);
    setModal(null);
  }

  function remove(key){
    if(key.startsWith('mfr-')){
      const i=parseInt(key.split('-')[1]);
      setMfrAsgn(p=>{const n=[...p];n[i]=null;return n;});
    } else {
      setAsgn(p=>{const n={...p};delete n[key];return n;});
    }
  }

  function toggleMfr(){
    setMfrActive(v=>{if(v)setMfrAsgn([null,null]);return !v;});
  }

  async function handleSubmit(){
    if(!name.trim()||submitting)return;
    setSubmitting(true);
    try{
      await pushSubmissions({
        submittedBy:name.trim(),
        submittedAt:new Date().toISOString(),
        assignments:asgn,
        mfrActive,
        mfrAssignments:mfrAsgn,
      });
      setSubmitted(true);
      showToast('Lineup saved!');
    } catch(e){
      showToast('Save failed — check your connection');
    }
    setSubmitting(false);
  }

  const fullTeams=TEAMS.filter(t=>t.type==='full');
  const partTeams=TEAMS.filter(t=>t.type==='part');
  const filtered=DRIVERS.filter(d=>!dSearch||d.toLowerCase().includes(dSearch.toLowerCase()));

  function TeamCard({team}){
    const tf=Array.from({length:team.slots},(_,i)=>asgn[`${team.id}-${i}`]).filter(Boolean).length;
    const bc=tf===team.slots?'var(--green)':tf>0?'var(--yellow)':'var(--border)';
    return (
      <div style={{background:'var(--surface)',border:`1px solid ${bc}`,borderRadius:8,overflow:'hidden',transition:'border-color 0.3s'}}>
        <div style={{padding:'9px 14px',background:'var(--surface2)',borderBottom:'1px solid var(--border)',
          display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontFamily:'var(--font-d)',fontSize:18,letterSpacing:1.5}}>{team.name}</span>
          <span style={{fontSize:10,fontWeight:600,letterSpacing:1,textTransform:'uppercase',
            color:team.type==='full'?'var(--green)':'var(--yellow)',
            background:team.type==='full'?'rgba(46,204,113,0.12)':'rgba(245,197,24,0.12)',
            padding:'3px 8px',borderRadius:3}}>
            {team.type==='full'?'Charter':'Part-Time'}
          </span>
        </div>
        <div style={{padding:'10px 12px',display:'flex',flexDirection:'column',gap:7}}>
          {Array.from({length:team.slots},(_,i)=>{
            const key=`${team.id}-${i}`;
            return (
              <Slot key={key} label={`Car ${i+1}`} driver={asgn[key]} isMfr={false}
                onClick={()=>setModal({key,title:`${team.name.toUpperCase()} — CAR ${i+1}`})}
                onRemove={()=>remove(key)}/>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      {/* HEADER */}
      <div style={{borderBottom:'1px solid var(--border)',padding:'16px 24px',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        position:'sticky',top:0,background:'rgba(13,13,13,0.96)',backdropFilter:'blur(8px)',zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:30,height:30,background:'var(--red)',clipPath:'polygon(0 0,100% 0,85% 100%,15% 100%)'}}/>
          <div>
            <div style={{fontFamily:'var(--font-d)',fontSize:22,letterSpacing:2,lineHeight:1}}>
              2027 INDYCAR <span style={{color:'var(--red)'}}>LINEUP</span>
            </div>
            <div style={{fontSize:10,color:'var(--grey)',letterSpacing:1,textTransform:'uppercase',marginTop:1}}>Season Predictor</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{fontSize:12,color:'var(--grey)'}}>
            <span style={{color:'var(--white)',fontWeight:600}}>{filled}</span> / {total}
          </div>
          <button onClick={()=>setShowCompare(true)} style={{
            background:'none',border:'1px solid var(--border)',borderRadius:6,
            color:'var(--grey)',fontSize:12,fontWeight:500,padding:'7px 14px',
            letterSpacing:0.5,cursor:'pointer',transition:'all 0.2s'
          }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--grey)';e.currentTarget.style.color='var(--white)'}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--grey)'}}>
            VIEW ALL PREDICTIONS
          </button>
        </div>
      </div>

      {/* PROGRESS */}
      <div style={{height:3,background:'var(--border)'}}>
        <div style={{height:'100%',width:`${pct}%`,
          background:'linear-gradient(90deg,var(--red),var(--yellow))',transition:'width 0.4s'}}/>
      </div>

      {/* MAIN */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 252px',flex:1,minHeight:0}}>

        {/* LEFT */}
        <div style={{padding:'20px 22px',borderRight:'1px solid var(--border)',overflowY:'auto'}}>
          <SH>Full-Time Charter Teams</SH>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(264px,1fr))',gap:12,marginBottom:22}}>
            {fullTeams.map(t=><TeamCard key={t.id} team={t}/>)}
          </div>

          {/* MFR */}
          <div style={{background:'var(--surface)',border:`1px solid ${mfrActive?'var(--mfr-gold)':'var(--mfr-gold-dim)'}`,
            borderRadius:8,overflow:'hidden',marginBottom:22,opacity:mfrActive?1:0.55,transition:'all 0.3s'}}>
            <div style={{padding:'10px 14px',background:'rgba(212,160,23,0.06)',
              borderBottom:`1px solid ${mfrActive?'var(--mfr-gold)':'var(--mfr-gold-dim)'}`,
              display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontFamily:'var(--font-d)',fontSize:16,letterSpacing:1.5,color:'var(--mfr-gold)'}}>MANUFACTURER CHARTER CARS</div>
                <div style={{fontSize:11,color:'var(--grey)',marginTop:1}}>Two additional manufacturer-backed entries</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:9}}>
                <span style={{fontSize:11,fontWeight:500,color:mfrActive?'var(--mfr-gold)':'var(--grey)',letterSpacing:0.5}}>
                  {mfrActive?'ACTIVE':'INACTIVE'}
                </span>
                <div onClick={toggleMfr} style={{
                  width:42,height:22,background:mfrActive?'var(--mfr-gold)':'var(--border)',
                  borderRadius:11,position:'relative',cursor:'pointer',transition:'background 0.25s'
                }}>
                  <div style={{width:16,height:16,background:'var(--white)',borderRadius:'50%',
                    position:'absolute',top:3,left:3,transition:'transform 0.25s',
                    transform:mfrActive?'translateX(20px)':'translateX(0)'}}/>
                </div>
              </div>
            </div>
            <div style={{padding:'10px 12px',display:'flex',gap:10}}>
              {[0,1].map(i=>(
                <div key={i} className="sw" style={{flex:1}}>
                  <div style={{
                    height:44,border:`1.5px ${mfrAsgn[i]?'solid':'dashed'} ${mfrAsgn[i]?'var(--mfr-gold)':'var(--mfr-gold-dim)'}`,
                    borderRadius:6,display:'flex',alignItems:'center',justifyContent:'space-between',
                    padding:'0 12px',cursor:mfrActive&&!mfrAsgn[i]?'pointer':'default',
                    background:mfrAsgn[i]?'rgba(212,160,23,0.08)':'#1E1E1E',
                    transition:'all 0.2s',pointerEvents:mfrActive?'auto':'none'
                  }}
                  onClick={()=>mfrActive&&!mfrAsgn[i]&&setModal({key:`mfr-${i}`,title:`MFR CAR ${i+1}`})}>
                    <span style={{fontSize:11,fontWeight:500,letterSpacing:1,textTransform:'uppercase',color:'var(--grey)'}}>MFR Car {i+1}</span>
                    {mfrAsgn[i]&&<span style={{fontWeight:600,fontSize:14,color:'var(--mfr-gold)'}}>{mfrAsgn[i]}</span>}
                    {mfrAsgn[i]&&<button className="rm" onClick={e=>{e.stopPropagation();remove(`mfr-${i}`);}} style={{
                      width:22,height:22,borderRadius:'50%',background:'rgba(212,160,23,0.15)',
                      border:'none',color:'var(--mfr-gold)',fontSize:13,display:'flex',
                      alignItems:'center',justifyContent:'center',padding:0
                    }}>✕</button>}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <SH>Charter / Part-Time</SH>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(264px,1fr))',gap:12}}>
            {partTeams.map(t=><TeamCard key={t.id} team={t}/>)}
          </div>
        </div>

        {/* RIGHT: pool */}
        <div style={{padding:'16px 13px',display:'flex',flexDirection:'column',
          background:'var(--surface)',position:'sticky',top:80,height:'calc(100vh - 83px)',overflow:'hidden'}}>
          <SH>Driver Pool</SH>
          <div style={{fontSize:11,color:'var(--grey)',marginBottom:7,letterSpacing:0.5}}>
            {DRIVERS.length-used.size} of {DRIVERS.length} available
          </div>
          <input value={dSearch} onChange={e=>setDSearch(e.target.value)}
            placeholder="Search…" style={{width:'100%',marginBottom:9}}/>
          <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:4,paddingRight:2}}>
            {filtered.map(d=>(
              <div key={d} style={{
                padding:'7px 10px',background:used.has(d)?'transparent':'var(--surface2)',
                border:`1px solid ${used.has(d)?'transparent':'var(--border)'}`,
                borderRadius:6,display:'flex',alignItems:'center',justifyContent:'space-between',
                opacity:used.has(d)?0.25:1,transition:'all 0.12s',
                textDecoration:used.has(d)?'line-through':'none',
              }}>
                <span style={{fontSize:13,fontWeight:600,letterSpacing:0.3}}>{d}</span>
                <div style={{width:6,height:6,borderRadius:'50%',
                  background:used.has(d)?'var(--grey-dim)':'var(--border)'}}/>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* SUBMIT BAR */}
      <div style={{padding:'14px 24px',borderTop:'1px solid var(--border)',background:'var(--bg)',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        position:'sticky',bottom:0,gap:14,flexWrap:'wrap',zIndex:50}}>
        <div style={{fontSize:13,color:complete?'var(--green)':'var(--grey)'}}>
          {submitted
            ? '✓ Lineup locked in — share this page with others'
            : complete
              ? '✓ Lineup complete — enter your name to submit'
              : `${total-filled} slot${total-filled!==1?'s':''} remaining`
          }
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {complete&&!submitted&&(
            <input value={name} onChange={e=>setName(e.target.value)}
              placeholder="Your name…"
              style={{width:150,padding:'9px 12px'}}
              onKeyDown={e=>e.key==='Enter'&&name.trim()&&handleSubmit()}/>
          )}
          {submitted ? (
            <button onClick={()=>setShowCompare(true)} style={{
              fontFamily:'var(--font-d)',fontSize:17,letterSpacing:2,
              background:'var(--green)',border:'none',color:'var(--white)',
              padding:'10px 24px',borderRadius:6,cursor:'pointer',
              clipPath:'polygon(0 0,100% 0,97% 100%,3% 100%)'
            }}>VIEW ALL PREDICTIONS</button>
          ) : (
            <button onClick={handleSubmit}
              disabled={!complete||!name.trim()||submitting}
              style={{
                fontFamily:'var(--font-d)',fontSize:17,letterSpacing:2,
                background:'var(--red)',border:'none',color:'var(--white)',
                padding:'10px 24px',borderRadius:6,cursor:'pointer',
                clipPath:'polygon(0 0,100% 0,97% 100%,3% 100%)',
                opacity:(!complete||!name.trim())?0.4:1,
                display:'flex',alignItems:'center',gap:8,transition:'opacity 0.2s'
              }}>
              {submitting?<><Spinner/><span>SAVING…</span></>:'LOCK IN LINEUP'}
            </button>
          )}
        </div>
      </div>

      <DriverModal open={!!modal} title={modal?.title||''} used={used}
        onSelect={d=>assign(modal.key,d)} onClose={()=>setModal(null)}/>

      {showCompare&&<CompareView onClose={()=>setShowCompare(false)}/>}

      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
